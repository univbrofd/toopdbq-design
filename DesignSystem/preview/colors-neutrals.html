<!-- @dsCard group="Colors" --><!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head>
<body>
  <div class="eyebrow">Cool neutral ramp — fields, tracks, placeholders</div>
  <div class="grid" style="grid-template-columns: repeat(7,1fr); gap:9px;">
    <div class="sw"><div class="chip" style="background:#212121;height:48px;"></div><span class="hx">212121</span></div>
    <div class="sw"><div class="chip" style="background:#2b2b2b;height:48px;"></div><span class="hx">2B2B2B</span></div>
    <div class="sw"><div class="chip" style="background:#333;height:48px;"></div><span class="hx">333333</span></div>
    <div class="sw"><div class="chip" style="background:#444;height:48px;"></div><span class="hx">444444</span></div>
    <div class="sw"><div class="chip" style="background:#666;height:48px;"></div><span class="hx">666666</span></div>
    <div class="sw"><div class="chip" style="background:#7f7f7f;height:48px;"></div><span class="hx">7F7F7F</span></div>
    <div class="sw"><div class="chip" style="background:#838383;height:48px;"></div><span class="hx">838383</span></div>
    <div class="sw"><div class="chip" style="background:#a9a9a9;height:48px;"></div><span class="hx">A9A9A9</span></div>
    <div class="sw"><div class="chip" style="background:#b6b6b6;height:48px;"></div><span class="hx">B6B6B6</span></div>
    <div class="sw"><div class="chip" style="background:#cdcdcd;height:48px;"></div><span class="hx">CDCDCD</span></div>
    <div class="sw"><div class="chip" style="background:#d9d9d9;height:48px;"></div><span class="hx">D9D9D9</span></div>
  </div>
  <div class="row" style="gap:18px;margin-top:2px;">
    <span class="mono">7F7F7F — text-field fill</span>
    <span class="mono">444444 — progress track</span>
    <span class="mono">333333 — avatar placeholder</span>
  </div>
</body></html>
