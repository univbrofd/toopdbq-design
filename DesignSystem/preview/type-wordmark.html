<!-- @dsCard group="Type" name="Display & wordmark" subtitle="Pacifico script + Noto Sans JP bold — app identity" --><!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../DesignSystem/colors_and_type.css">
<link rel="stylesheet" href="../../DesignSystem/preview/card.css">
<style>
  body { gap:0; background:
    linear-gradient(160deg, rgba(0,0,0,0.35), rgba(0,0,0,0.66)),
    radial-gradient(120% 130% at 80% 110%, #4a3a6a, #11131f 72%); }
  .eyebrow { margin-bottom:8px; }
  .spec { display:flex; flex-direction:column; }
  .spec .r { display:grid; grid-template-columns:150px 1fr; gap:28px; align-items:baseline;
    padding:20px 0; border-top:1px solid var(--border-hairline); }
  .spec .r:first-child { border-top:none; }
  .meta .nm { font-family:var(--font-latin); font-weight:600; font-size:12px; color:#fff; letter-spacing:.03em; }
  .meta .sp { display:block; margin-top:5px; font-family:var(--font-latin); font-weight:400; font-size:10px;
    color:var(--fg-3); letter-spacing:.07em; text-transform:uppercase; }
</style></head>
<body>
  <div class="eyebrow">Display &amp; wordmark — Pacifico script + Noto Sans JP bold</div>
  <div class="spec">
    <div class="r">
      <div class="meta"><span class="nm">t-logo</span><span class="sp">Pacifico · 400 · 32</span></div>
      <div class="t-logo" style="font-size:44px;line-height:1;">Toopdbq</div>
    </div>
    <div class="r">
      <div class="meta"><span class="nm">t-display</span><span class="sp">Noto Sans JP · 700 · 22</span></div>
      <div class="t-display">で新しい世界を見つけてください</div>
    </div>
  </div>
</body></html>
