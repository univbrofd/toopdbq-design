<!-- @dsCard group="Colors" --><!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../DesignSystem/colors_and_type.css">
<link rel="stylesheet" href="../../DesignSystem/preview/card.css">
<style>
  .fgrow { display:flex; align-items:baseline; gap:14px; padding:10px 16px; border-radius:8px;
    background: linear-gradient(120deg,#2a2440,#16131f); }
  .dot { width:34px;height:34px;border-radius:50%;flex:none;align-self:center;border:1px solid rgba(255,255,255,.12);}
</style></head>
<body>
  <div class="eyebrow">Foreground on dark — white at four opacities over photography</div>
  <div class="col" style="gap:10px;">
    <div class="fgrow"><span class="dot" style="background:#fff;"></span><span style="color:#fff;font-weight:700;font-size:16px;">Primary text</span><span class="mono">#FFFFFF · 100%</span></div>
    <div class="fgrow"><span class="dot" style="background:rgba(255,255,255,.64);"></span><span style="color:rgba(255,255,255,.64);font-weight:600;font-size:15px;">Secondary / hairline borders</span><span class="mono">#FFFFFF · 64%</span></div>
    <div class="fgrow"><span class="dot" style="background:rgba(255,255,255,.56);"></span><span style="color:rgba(255,255,255,.56);font-weight:500;font-size:14px;">Progress-bar fill / muted</span><span class="mono">#FFFFFF · 56%</span></div>
    <div class="fgrow"><span class="dot" style="background:rgba(255,255,255,.40);"></span><span style="color:rgba(255,255,255,.40);font-weight:500;font-size:13px;">Disabled / hint</span><span class="mono">#FFFFFF · 40%</span></div>
  </div>
</body></html>
