<!-- @dsCard group="Components" name="WdToggl" subtitle="ラベルは白ピルノブの上に乗る · ON=colorful gradient track · glass: no（小型コントロール）" --><!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../DesignSystem/colors_and_type.css">
<link rel="stylesheet" href="../../DesignSystem/preview/card.css">
<link rel="stylesheet" href="../../DesignSystem/preview/components.css">
<style> body { background:#121214; } .u{display:flex;flex-direction:column;align-items:center;gap:10px;} .u .n{font-size:10px;color:var(--fg-2);} </style>
</head>
<body>
  <div class="eyebrow">WdToggl — ラベルがノブに乗って一緒にスライド（タップで切替）</div>
  <div class="row" style="gap:8px;"><span class="glass-tag no">glass: no — 小型コントロール</span></div>
  <div class="row" style="gap:40px;justify-content:center;margin-top:6px;">
    <div class="u"><div class="wd-toggle on" role="switch" aria-checked="true" tabindex="0"><span class="lab on">ON</span><span class="pill"></span></div><span class="n">ON · gradient track</span></div>
    <div class="u"><div class="wd-toggle" role="switch" aria-checked="false" tabindex="0"><span class="lab off">OFF</span><span class="pill"></span></div><span class="n">OFF · --surface-toggle-off</span></div>
  </div>
  <script>
    document.querySelectorAll('.wd-toggle').forEach(function (t) {
      t.addEventListener('click', function () {
        var on = !t.classList.contains('on');
        t.classList.toggle('on', on);
        t.setAttribute('aria-checked', String(on));
        var lab = t.querySelector('.lab');
        lab.textContent = on ? 'ON' : 'OFF';
        lab.classList.toggle('on', on);
        lab.classList.toggle('off', !on);
      });
    });
  </script>
</body></html>
