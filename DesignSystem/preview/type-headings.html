<!-- @dsCard group="Type" name="Headings & actions" subtitle="Nav title · button · card title" --><!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../DesignSystem/colors_and_type.css">
<link rel="stylesheet" href="../../DesignSystem/preview/card.css">
<style>
  body { gap:0; }
  .eyebrow { margin-bottom:8px; }
  .spec { display:flex; flex-direction:column; }
  .spec .r { display:grid; grid-template-columns:150px 1fr; gap:28px; align-items:baseline;
    padding:20px 0; border-top:1px solid var(--border-hairline); }
  .spec .r:first-child { border-top:none; }
  .meta .nm { font-family:var(--font-latin); font-weight:600; font-size:12px; color:#fff; letter-spacing:.03em; }
  .meta .sp { display:block; margin-top:5px; font-family:var(--font-latin); font-weight:400; font-size:10px;
    color:var(--fg-3); letter-spacing:.07em; text-transform:uppercase; }
</style></head>
<body>
  <div class="eyebrow">Headings &amp; actions</div>
  <div class="spec">
    <div class="r">
      <div class="meta"><span class="nm">t-nav-title</span><span class="sp">Inter · 400 · 20</span></div>
      <div class="t-nav-title" style="text-shadow:none;">Profile</div>
    </div>
    <div class="r">
      <div class="meta"><span class="nm">t-button</span><span class="sp">Noto Sans JP · 700 · 18</span></div>
      <div class="t-button" style="text-shadow:none;">このサークルを選択</div>
    </div>
    <div class="r">
      <div class="meta"><span class="nm">t-title</span><span class="sp">Noto Sans JP · 700 · 16</span></div>
      <div class="t-title">渋谷コミュニティ</div>
    </div>
  </div>
</body></html>
