<!-- @dsCard group="Spacing" --><!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
<style>
  .r { display:flex;flex-direction:column;align-items:center;gap:8px; }
  .r .box { width:74px;height:60px;background:var(--glass-fill);border:1px solid rgba(255,255,255,.18); }
  .r .nm { font-size:11px;font-weight:600; } .r .vv { font-size:10px;color:var(--fg-2); }
</style></head>
<body>
  <div class="eyebrow">Corner radii — nothing is sharp</div>
  <div class="row" style="justify-content:space-between;">
    <div class="r"><div class="box" style="border-radius:7px;"></div><span class="nm">sm 7</span><span class="vv">inner login</span></div>
    <div class="r"><div class="box" style="border-radius:8px;"></div><span class="nm">md 8</span><span class="vv">buttons · cards</span></div>
    <div class="r"><div class="box" style="border-radius:16px;"></div><span class="nm">lg 16</span><span class="vv">auth card</span></div>
    <div class="r"><div class="box" style="border-radius:100px;width:96px;"></div><span class="nm">pill 100</span><span class="vv">fields · toggle · bar</span></div>
    <div class="r"><div class="box" style="border-radius:50%;width:60px;"></div><span class="nm">full</span><span class="vv">icon btn · avatar</span></div>
  </div>
</body></html>
