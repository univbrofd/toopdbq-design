<!-- @dsCard group="Brand" --><!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../DesignSystem/colors_and_type.css">
<link rel="stylesheet" href="../../DesignSystem/preview/card.css">
<style>
  body { background:#0d0d0f; }
  .imgs { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; }
  .imgs figure { position:relative; height:120px; border-radius:10px; overflow:hidden; border:1px solid rgba(255,255,255,.1); }
  .imgs img { width:100%; height:100%; object-fit:cover; display:block; }
  .imgs figcaption { position:absolute; left:0; right:0; bottom:0; padding:6px 8px; font-size:9.5px; color:#fff;
    background:linear-gradient(0deg,rgba(0,0,0,.7),transparent); }
</style></head>
<body>
  <div class="eyebrow">Imagery — full-bleed AI photography, warm-meets-cool, soft grain</div>
  <div class="imgs">
    <figure><img src="../../assets/images/auth_background.png"><figcaption>auth_background · grainy gradient figure</figcaption></figure>
    <figure><img src="https://cdn.midjourney.com/e5eb9ca5-2c88-4568-81ba-3503bac726f2/0_2.png"><figcaption>circle cover</figcaption></figure>
    <figure><img src="https://cdn.midjourney.com/97b2133d-6ad1-4461-9ff9-e9a6c2542874/0_0.png"><figcaption>story content</figcaption></figure>
  </div>
</body></html>
