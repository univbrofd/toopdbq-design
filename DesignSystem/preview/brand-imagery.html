<!-- @dsCard group="Brand" --><!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../DesignSystem/colors_and_type.css">
<link rel="stylesheet" href="../../DesignSystem/preview/card.css">
<style>
  body { background:#0d0d0f; }
  .sec { margin:14px 0 6px; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--text-3); }
  .imgs { display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; }
  .imgs figure { position:relative; aspect-ratio:9/16; border-radius:10px; overflow:hidden; border:1px solid rgba(255,255,255,.1); margin:0; }
  .imgs img { width:100%; height:100%; object-fit:cover; display:block; }
  .imgs figcaption { position:absolute; left:0; right:0; bottom:0; padding:6px 8px; font-size:9.5px; color:#fff;
    background:linear-gradient(0deg,rgba(0,0,0,.7),transparent); }
  .avs { display:flex; flex-wrap:wrap; gap:14px; }
  .avs figure { width:96px; margin:0; text-align:center; }
  .avs .ring { width:96px; height:96px; border-radius:50%; overflow:hidden; border:2px solid rgba(255,255,255,.18); box-shadow:var(--shadow-avatar); }
  .avs img { width:100%; height:100%; object-fit:cover; display:block; }
  .avs figcaption { margin-top:6px; font-size:9.5px; color:var(--text-2); }
  .wide { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; }
  .wide figure { position:relative; height:120px; border-radius:10px; overflow:hidden; border:1px solid rgba(255,255,255,.1); margin:0; }
  .wide img { width:100%; height:100%; object-fit:cover; display:block; }
  .wide figcaption { position:absolute; left:0; right:0; bottom:0; padding:6px 8px; font-size:9.5px; color:#fff;
    background:linear-gradient(0deg,rgba(0,0,0,.7),transparent); }
</style></head>
