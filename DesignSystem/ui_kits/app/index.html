<!DOCTYPE html>
<!-- @dsCard group="UI Kit — App" name="App UI Kit — Toopdbq" subtitle="Interactive: Login → Universe globe → Story Viewer → Circle Timeline" viewport="441x760" -->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Toopdbq — App UI Kit</title>
<link rel="stylesheet" href="app.css">
<style>
  @keyframes twinkle { 0%,100% { opacity: .25; } 50% { opacity: 1; } }
  @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes heroIn { from { transform: scale(.35); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .hero-in { animation: heroIn .42s cubic-bezier(.16,1,.3,1) both; }
  .toast { position: absolute; top: 92px; left: 50%; transform: translateX(-50%); z-index: 90;
    padding: 9px 16px; border-radius: 8px; background: rgba(0,0,0,.8); color: #fff;
    font-family: var(--font-jp); font-weight: 500; font-size: 12px; display: flex; align-items: center; gap: 8px;
    animation: fade .25s ease both; box-shadow: 0 8px 24px rgba(0,0,0,.5); }
  .kit-tag { position: fixed; left: 24px; bottom: 20px; font-family: var(--font-latin); font-size: 11px;
    color: rgba(255,255,255,.4); }
</style>
</head>
<body>
<div id="root"></div>
<div class="kit-tag">Toopdbq — mobile UI kit · tap to explore</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="LoginScreen.jsx"></script>
<script type="text/babel" src="UniverseScreen.jsx"></script>
<script type="text/babel" src="StoryViewerScreen.jsx"></script>
<script type="text/babel" src="CircleTimelineSheet.jsx"></script>
<script type="text/babel" src="StoryCommentSheet.jsx"></script>

<script type="text/babel">
const { useState } = React;

// flatten stories with circle reference (circle-major order)
const FLAT = [];
window.TOOPDATA.forEach((c) => c.stories.forEach((s) => FLAT.push({ ...s, circle: c })));
const firstIndexOfCircle = (id) => FLAT.findIndex((s) => s.circle.id === id);
const indexOfStory = (sid) => FLAT.findIndex((s) => s.id === sid);

function App() {
  const [screen, setScreen] = useState('login');     // login | universe
  const [story, setStory] = useState(null);          // { start } or null
  const [timeline, setTimeline] = useState(null);     // circle or null
  const [comments, setComments] = useState(null);     // story or null
  const [toast, setToast] = useState(null);

  const flash = (msg) => { setToast(msg); clearTimeout(window.__t); window.__t = setTimeout(() => setToast(null), 1600); };

  const openStory = (circleId) => setStory({ start: firstIndexOfCircle(circleId) });
  const openStoryById = (sid) => { setTimeline(null); setStory({ start: indexOfStory(sid) }); };

  return (
    <div className="phone">
      <div className="screen">
        {screen === 'login' && <LoginScreen onLogin={() => setScreen('universe')} />}

        {screen === 'universe' && (
          <UniverseScreen onOpenStory={openStory} onMenu={() => flash('メニュー（準備中）')} />
        )}

        {story && (
          <div className="layer hero-in" style={{ zIndex: 30 }}>
            <StoryViewerScreen
              flat={FLAT} startIndex={story.start}
              onClose={() => setStory(null)}
              onOpenTimeline={(c) => setTimeline(c)}
              onOpenComments={(s) => setComments(s)}
              onPost={() => flash('投稿しました')}
            />
          </div>
        )}

        {timeline && (
          <CircleTimelineSheet circle={timeline}
            onClose={() => setTimeline(null)}
            onOpenStory={openStoryById}
            onPost={() => { setTimeline(null); flash('投稿しました'); }} />
        )}

        {comments && (
          <StoryCommentSheet story={comments}
            onClose={() => setComments(null)}
            onSend={() => flash('コメントしました')} />
        )}

        {toast && <div className="toast"><span style={{ color: 'var(--success)' }}>●</span>{toast}</div>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
