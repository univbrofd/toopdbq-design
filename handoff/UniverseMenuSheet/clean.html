<!-- clean render of DesignSystem/preview/comp-menu-sheet.html "完成形(After)" only — for side-by-side vs Flutter -->
<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../DesignSystem/colors_and_type.css">
<style>
  /* 390x780 phone frame, sheet pinned to bottom over the universe backdrop */
  html,body { margin:0; }
  .frame { width:390px; height:780px; position:relative; overflow:hidden;
    display:flex; flex-direction:column; justify-content:flex-end;
    background:
      radial-gradient(120% 70% at 50% -8%, #221d38 0%, #0c0a14 52%),
      radial-gradient(2px 2px at 18% 26%, rgba(255,255,255,.45), transparent),
      radial-gradient(1.5px 1.5px at 72% 18%, rgba(255,255,255,.32), transparent),
      radial-gradient(1.5px 1.5px at 40% 13%, rgba(255,255,255,.30), transparent),
      radial-gradient(1.5px 1.5px at 86% 38%, rgba(255,255,255,.22), transparent),
      radial-gradient(2px 2px at 28% 46%, rgba(255,255,255,.18), transparent); }
  .globe { position:absolute; left:50%; top:120px; width:150px; height:150px; transform:translateX(-50%);
    border-radius:50%; background:radial-gradient(60% 60% at 38% 32%, #2c6f7a, #123 70%, #06080e);
    box-shadow:0 0 70px rgba(0,95,103,.45), inset -16px -12px 34px rgba(0,0,0,.7); opacity:.92; }

  .sheet { background:var(--surface-raised); border-radius:16px 16px 0 0;
    box-shadow:0 -8px 24px rgba(0,0,0,.45); padding:10px 20px 0; position:relative; }
  .grab { width:36px; height:4px; border-radius:99px; background:var(--gray-mid); margin:0 auto 4px; }
  .items { padding:4px 0; }
  .mi { display:flex; align-items:center; gap:16px; min-height:56px; position:relative; }
  .mi + .mi::before { content:""; position:absolute; top:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg, rgba(255,255,255,.04), rgba(255,255,255,.16) 50%, rgba(255,255,255,.04)); }
  .mi img { width:28px; height:28px; flex:none; object-fit:contain; }
  .mi .lbl { flex:1; font:700 16px var(--font-jp); color:var(--state-error); }
  .safe { height:24px; }
</style></head>
<body>
  <div class="frame">
    <div class="globe"></div>
    <div class="sheet">
      <div class="grab"></div>
      <div class="items">
        <div class="mi"><img src="../../DesignSystem/assets/icons/icon_leave.png" alt=""><span class="lbl">ログアウト</span></div>
        <div class="mi"><img src="../../DesignSystem/assets/icons/icon_delete.png" alt=""><span class="lbl">アカウントを削除</span></div>
      </div>
      <div class="safe"></div>
    </div>
  </div>
</body></html>
