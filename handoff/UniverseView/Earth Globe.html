<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UniverseView — Earth Globe (live specimen)</title>

<!-- Toopdbq DS tokens (colors / type / fonts) -->
<link rel="stylesheet" href="../../DesignSystem/colors_and_type.css" />
<!-- MapLibre GL JS — the real rendering engine (positron + globe projection) -->
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css" />
<script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>
<!-- three.js — 地図上に乗る実 3D (real-NN.glb / EXT_meshopt_compression) を描く custom layer 用 -->
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/libs/meshopt_decoder.js"></script>

<style>
/* ============================================================================
   STUDIO  — neutral backdrop so the globe specimen reads as a placed surface
   ========================================================================== */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; min-height: 100%;
  background:
    radial-gradient(120% 90% at 50% -10%, #16161d 0%, #0d0d0f 55%, #08080b 100%);
  color: var(--text-1);
  font-family: var(--font-latin);
  -webkit-font-smoothing: antialiased;
}
.studio {
  min-height: 100vh;
  display: flex; align-items: flex-start; justify-content: center;
  gap: 40px; padding: 40px 36px 64px;
  flex-wrap: wrap;
}
.stage { display: flex; flex-direction: column; align-items: center; gap: 20px; }

.specimen-cap { text-align: center; max-width: 402px; }
.specimen-cap .eyebrow {
  font-weight: 600; font-size: 10px; letter-spacing: .16em; text-transform: uppercase;
  color: var(--fg-3);
}
.specimen-cap h1 {
  font-family: var(--font-jp); font-weight: 700; font-size: 17px; margin-top: 6px;
  color: var(--text-1);
}
.specimen-cap p { font-size: 11.5px; line-height: 1.55; color: var(--fg-2); margin-top: 7px; }

/* ============================================================================
   iPhone 17 frame  (402×874 · r55 · Dynamic Island)  — DS card.css canonical
   ========================================================================== */
.phone {
  position: relative; width: 402px; height: 874px; flex: none;
  border-radius: 55px; overflow: hidden; background: var(--bg);
  box-shadow: 0 0 0 2px #2a2a31, 0 0 0 12px #0a0a0e, 0 0 0 13px #303039,
              0 36px 90px rgba(0,0,0,.62);
  isolation: isolate;
}
.phone .screen { position: absolute; inset: 0; overflow: hidden; }

/* ---- L0  space backdrop  (#bg-white = the engine's space gradient) -------- */
#bg-white {
  position: absolute; inset: 0; z-index: 0;
  background:
    radial-gradient(125% 120% at 50% 38%,
      var(--space-core)  0%,
      var(--space-mid)   46%,
      var(--space-edge)  100%);
  transition: opacity .6s var(--ease-out);
}

/* ---- L0  the MapLibre canvas (positron sphere) ---------------------------- */
#map { position: absolute; inset: 0; z-index: 1; background: transparent;
  filter: saturate(1.08); }
#map .maplibregl-canvas { outline: none; }
.maplibregl-ctrl-attrib { font-family: var(--font-latin); }
.maplibregl-ctrl-bottom-right { bottom: 36px; }            /* clear home indicator */
.maplibregl-ctrl-attrib.maplibregl-compact { background: rgba(0,0,0,.35); }
.maplibregl-ctrl-attrib a { color: rgba(255,255,255,.6); }

/* ---- L0.5  atmosphere ring  (#strato-shadow) ------------------------------ */
/* A soft stratospheric halo hugging the limb of the sphere. Sized & faded by
   zoom from JS (only meaningful at globe scale). */
#strato-shadow {
  position: absolute; left: 50%; top: 50%; z-index: 2;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  pointer-events: none;
  background: radial-gradient(closest-side,
      transparent calc(100% - var(--atmo-thickness) - var(--atmo-blur)),
      var(--atmo-color) calc(100% - var(--atmo-thickness)),
      transparent 100%);
  opacity: 0;
  will-change: width, height, opacity;
}

/* ---- L0.6  globe edge  (#globe-frame = the crisp white silhouette line) ---- */
#globe-frame {
  position: absolute; left: 50%; top: 50%; z-index: 3;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  pointer-events: none;
  border: var(--frame-width) solid rgba(255,255,255,var(--frame-opacity));
  filter: blur(var(--frame-blur));
  box-shadow: 0 0 calc(var(--frame-blur) * 4) rgba(255,255,255,calc(var(--frame-opacity) * .5));
  opacity: 0;
  will-change: width, height, opacity;
}

/* ---- center marker  (青ドット + グロー) — a MapLibre Marker DOM node -------- */
.center-marker { position: relative; width: 0; height: 0; pointer-events: none; }
.center-marker .glow {
  position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
  width: calc(var(--marker-size) * 3.6); height: calc(var(--marker-size) * 3.6);
  border-radius: 50%;
  background: radial-gradient(closest-side, var(--marker-color) 0%, transparent 72%);
  opacity: var(--marker-glow);
  filter: blur(1px);
}
.center-marker .ping {
  position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
  width: var(--marker-size); height: var(--marker-size); border-radius: 50%;
  border: 1.5px solid var(--marker-color);
  animation: ping 2.6s var(--ease-out) infinite;
}
.center-marker .dot {
  position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
  width: var(--marker-size); height: var(--marker-size); border-radius: 50%;
  background: var(--marker-color);
  box-shadow: 0 0 0 2px rgba(255,255,255,.9), 0 2px 8px rgba(0,0,0,.7);
}
@keyframes ping {
  0%   { transform: translate(-50%,-50%) scale(1);   opacity: .9; }
  70%  { transform: translate(-50%,-50%) scale(3.2);  opacity: 0; }
  100% { transform: translate(-50%,-50%) scale(3.2);  opacity: 0; }
}
@media (prefers-reduced-motion: reduce) { .center-marker .ping { animation: none; } }

/* ---- protection scrims (top/bottom) so SafeArea chrome stays legible ------ */
.scrim-top {
  position: absolute; top: 0; left: 0; right: 0; height: 150px; z-index: 40;
  background: linear-gradient(180deg, rgba(0,0,0,.55) 0%, rgba(0,0,0,.28) 42%, transparent 100%);
  pointer-events: none;
}
.scrim-bottom {
  position: absolute; bottom: 0; left: 0; right: 0; height: 130px; z-index: 40;
  background: linear-gradient(0deg, rgba(0,0,0,.5) 0%, transparent 100%);
  pointer-events: none;
}

/* ---- SafeArea chrome (status bar / island / home indicator only) ---------- */
.dynamic-island {
  position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
  width: 125px; height: 36px; border-radius: 20px; background: #000; z-index: 70;
  pointer-events: none;
}
.statusbar {
  position: absolute; top: 0; left: 0; right: 0; height: 62px; z-index: 60;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 36px; pointer-events: none; color: #fff;
}
.statusbar .time { font-weight: 600; font-size: 16px; letter-spacing: .02em; }
.statusbar .sys { display: flex; align-items: center; gap: 7px; }
.statusbar .sys svg { display: block; }
.home-ind {
  position: absolute; left: 50%; bottom: 8px; transform: translateX(-50%);
  width: 140px; height: 5px; border-radius: 99px; background: rgba(255,255,255,.9);
  z-index: 60; pointer-events: none;
}

/* ============================================================================
   BOTTOM CHROME — circle playlist + post button (portable universe-list parts)
   Tokens come from the DS colors_and_type.css already loaded above.
   ========================================================================== */
button.wd-icon-btn { border: none; -webkit-appearance: none; appearance: none; }
.wd-icon-btn {
  position: relative; display: inline-flex; align-items: center; justify-content: center;
  border-radius: 50%; background: var(--glass-fill); cursor: pointer;
  transition: transform .12s var(--ease-out), opacity .12s var(--ease-out);
}
.wd-icon-btn::after {
  content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1px;
  background: var(--gradient-border);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
}
.wd-icon-btn img { width: 44%; height: 44%; object-fit: contain; }
.wd-icon-btn:active { transform: scale(.94); filter: brightness(.92); }
.wd-icon-btn.color {
  background: var(--lg-tint-dark);
  backdrop-filter: blur(var(--lg-blur)) saturate(var(--lg-saturate));
  -webkit-backdrop-filter: blur(var(--lg-blur)) saturate(var(--lg-saturate));
  box-shadow: inset 0 1px 0 var(--lg-specular-top), var(--lg-shadow);
}
.wd-icon-btn.color::before { display: none; }
.wd-icon-btn.color::after { background: var(--gradient-colorful-linear); padding: 1.5px; }
.wd-icon-btn.color img { position: relative; filter: drop-shadow(0 1px 2px rgba(0,0,0,.5)); }
@supports not ((backdrop-filter: blur(2px)) or (-webkit-backdrop-filter: blur(2px))) {
  .wd-icon-btn.color { background: rgba(8,8,12,.72); }
}
.wd-badge {
  position: absolute; top: -2px; right: -2px; width: 20px; height: 20px;
  border-radius: 50%; background: var(--lg-tint);
  backdrop-filter: blur(var(--lg-blur)) saturate(var(--lg-saturate));
  -webkit-backdrop-filter: blur(var(--lg-blur)) saturate(var(--lg-saturate));
  box-shadow: inset 0 1px 0 var(--lg-specular-top), inset 0 -1px 0 var(--lg-specular-bot), var(--lg-shadow);
  display: flex; align-items: center; justify-content: center;
}
.wd-badge::after {
  content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1px;
  background: var(--lg-edge);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
}
.wd-badge img { width: 11px; height: 11px; }
.wd-icon-btn.color.has-badge::before {
  -webkit-mask:
    radial-gradient(circle at calc(100% - 8px) 8px, rgba(0,0,0,0) 12px, #000 12.6px),
    radial-gradient(farthest-side, rgba(0,0,0,0) 4%, rgba(0,0,0,.62) 56%, #000 94%);
  -webkit-mask-composite: source-in;
  mask:
    radial-gradient(circle at calc(100% - 8px) 8px, rgba(0,0,0,0) 12px, #000 12.6px),
    radial-gradient(farthest-side, rgba(0,0,0,0) 4%, rgba(0,0,0,.62) 56%, #000 94%);
  mask-composite: intersect;
}
.wd-icon-btn.has-badge::after {
  -webkit-mask:
    radial-gradient(circle at calc(100% - 8px) 8px, rgba(0,0,0,0) 12px, #000 12.6px),
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: source-in, xor;
  mask:
    radial-gradient(circle at calc(100% - 8px) 8px, rgba(0,0,0,0) 12px, #000 12.6px),
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  mask-composite: intersect, exclude;
}
.playlist-veil {
  position: absolute; left: 0; right: 0; bottom: 0; height: 368px; z-index: 31; pointer-events: none;
  background: linear-gradient(0deg, rgba(0,0,0,.76) 0%, rgba(0,0,0,.54) 40%, rgba(0,0,0,.14) 76%, rgba(0,0,0,0) 100%);
}
.playlist {
  position: absolute; left: 0; right: 0; bottom: 0; height: 240px; z-index: 46;
  display: flex; flex-direction: column; justify-content: flex-start; gap: 16px;
  overflow-y: auto; padding: 18px 0 74px; scrollbar-width: none;
  -webkit-mask: linear-gradient(to bottom, transparent 0%, #000 11%, #000 80%, transparent 96%);
  mask: linear-gradient(to bottom, transparent 0%, #000 11%, #000 80%, transparent 96%);
}
.playlist::-webkit-scrollbar { display: none; }
.crow { display: flex; flex-direction: column; gap: 8px; flex: none; }
.chead { display: flex; align-items: center; gap: 9px; padding: 0 16px; }
.chead .cthumb { width: 30px; height: 30px; border-radius: 50%; flex: none; overflow: hidden;
  border: 1px solid rgba(255,255,255,.28); box-shadow: 0 1px 5px rgba(0,0,0,.5); }
.chead .cthumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.chead .cname { font: 600 12.5px var(--font-jp); color: var(--text-2); letter-spacing: .01em;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 240px;
  text-shadow: 0 1px 3px rgba(0,0,0,.85); }
.cstrip { display: flex; gap: 8px; overflow-x: auto; padding: 0 76px 0 16px; scrollbar-width: none; }
.cstrip::-webkit-scrollbar { display: none; }
.cell { position: relative; width: 75px; height: 134px; flex: none; border-radius: 11px;
  border: 1px solid rgba(255,255,255,.2); overflow: hidden; background: #2a2a2a; cursor: pointer;
  transition: transform .22s var(--ease-out); }
.cell .clip { position: absolute; inset: 1px; border-radius: 9px; overflow: hidden; }
.cell .clip img { width: 100%; height: 100%; object-fit: cover; display: block; }
.cell.rep { border: 2.5px solid #fff; }
.cell.rep .clip { inset: 1.5px; border-radius: 8px; }
.cell:active { transform: scale(.97); }
/* ============================================================================
   WdSideTool — 縦並びアクションレール（DS components.css 由来）
   avatar(poster+follow) → like → comment → pin · 右端中央に配置
   ========================================================================== */
.wd-side-tool {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  z-index: 50; display: flex; flex-direction: column; align-items: center; gap: 20px;
}
.wd-side-tool .wd-icon-btn { width: 47px; height: 47px; }
.wd-side-tool .act { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.wd-side-tool .act .ct {
  font-family: var(--font-latin); font-weight: 700; font-size: 12px; line-height: 1;
  color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,.6); font-variant-numeric: tabular-nums;
}
/* poster avatar — a touch larger + extra gap to the actions */
.wd-side-tool .wd-avatar { position: relative; width: 48px; height: 48px; flex: none; margin-bottom: 4px; }
.wd-side-tool .wd-avatar > img {
  width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
  box-shadow: 0 2px 8px rgba(0,0,0,.7);
}
.wd-side-tool .wd-avatar .b {
  position: absolute; right: -3px; bottom: -3px; width: 16px; height: 16px; border-radius: 50%;
  background: #fff; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 1px 4px rgba(0,0,0,.6);
}
.wd-side-tool .wd-avatar .b img { width: 9px; height: 9px; filter: brightness(0); }
/* liked — like button fills with --state-like (white heart on pink, soft glow) */
.wd-side-tool .act.liked .wd-icon-btn {
  background: var(--state-like); backdrop-filter: none; -webkit-backdrop-filter: none;
  box-shadow: 0 2px 10px rgba(255,62,136,.45);
}
.wd-side-tool .act.liked .wd-icon-btn::after { display: none; }
.wd-side-tool .act.liked .wd-icon-btn img { filter: drop-shadow(0 1px 2px rgba(0,0,0,.35)); }
.wd-side-tool .act.liked .ct { color: var(--state-like); }

.post-btn { position: absolute; right: 12px; bottom: 24px; z-index: 55; width: 56px; height: 56px; }
.post-btn.wd-icon-btn.color > img { width: 25px; height: 25px;
  filter: brightness(0) invert(1) drop-shadow(0 1px 2px rgba(0,0,0,.45)); }
.specimen-tag {
  position: absolute; left: 50%; bottom: 26px; transform: translateX(-50%);
  z-index: 55; pointer-events: none;
  font-family: var(--font-latin); font-size: 10px; letter-spacing: .14em;
  text-transform: uppercase; color: rgba(255,255,255,.5);
  text-shadow: 0 1px 3px rgba(0,0,0,.8);
}

/* ============================================================================
   PRESET RAIL  (specimen control — 🌍 Globe · 🗾 Region · 🏙 Street+3D)
   Placed BELOW the phone (not over the globe) so no app-chrome is added.
   ========================================================================== */
.preset-rail {
  display: flex; gap: 8px; padding: 6px;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.10);
  border-radius: var(--radius-pill);
  backdrop-filter: blur(14px) saturate(160%);
}
.preset-rail button {
  appearance: none; border: 0; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  padding: 10px 18px; border-radius: var(--radius-pill);
  font-family: var(--font-jp); font-weight: 700; font-size: 13px; color: var(--text-2);
  background: transparent; transition: all .2s var(--ease-standard);
}
.preset-rail button .ico { font-size: 16px; line-height: 1; }
.preset-rail button:hover { color: var(--text-1); }
.preset-rail button.active {
  color: #fff;
  background:
    linear-gradient(rgba(0,0,0,.25), rgba(0,0,0,.25)),
    var(--gradient-colorful);
  box-shadow: 0 2px 12px rgba(255,62,136,.28);
}
.hint { font-size: 11px; color: var(--fg-3); letter-spacing: .02em; }

/* ============================================================================
   TUNING PANEL  (the "詰める" surface — refine the globe LOOK live)
   ========================================================================== */
.panel {
  width: 312px; flex: none; align-self: stretch;
  background: rgba(20,20,26,.72);
  border: 1px solid rgba(255,255,255,.09);
  border-radius: 18px;
  backdrop-filter: blur(18px) saturate(150%);
  box-shadow: 0 18px 50px rgba(0,0,0,.5);
  overflow: hidden;
  position: sticky; top: 40px;
}
.panel header {
  display: flex; align-items: baseline; justify-content: space-between;
  padding: 16px 18px 12px; border-bottom: 1px solid rgba(255,255,255,.08);
}
.panel header .t { font-family: var(--font-jp); font-weight: 700; font-size: 14px; }
.panel header .s { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--fg-3); }
.panel .body { padding: 6px 18px 18px; max-height: 78vh; overflow-y: auto; }
.panel .body::-webkit-scrollbar { width: 8px; }
.panel .body::-webkit-scrollbar-thumb { background: rgba(255,255,255,.14); border-radius: 8px; }

.group { padding: 14px 0 6px; border-bottom: 1px solid rgba(255,255,255,.06); }
.group:last-child { border-bottom: 0; }
.group > .gt {
  font-size: 10px; letter-spacing: .15em; text-transform: uppercase;
  color: var(--text-2); font-weight: 700; margin-bottom: 10px;
  display: flex; align-items: center; gap: 7px;
}
.group > .gt .id { color: var(--fg-3); font-weight: 500; letter-spacing: 0; text-transform: none; font-size: 10px; }

.ctrl { margin-bottom: 13px; }
.ctrl .lab { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
.ctrl .lab span { font-size: 11.5px; color: var(--text-2); }
.ctrl .lab b { font-size: 11px; color: var(--text-1); font-variant-numeric: tabular-nums; font-weight: 600; }
.ctrl input[type=range] {
  -webkit-appearance: none; appearance: none; width: 100%; height: 3px; border-radius: 3px;
  background: rgba(255,255,255,.18); outline: none;
}
.ctrl input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none; width: 15px; height: 15px; border-radius: 50%;
  background: #fff; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.5);
}
.ctrl input[type=range]::-moz-range-thumb {
  width: 15px; height: 15px; border-radius: 50%; background: #fff; cursor: pointer; border: 0;
}
.swatches { display: flex; gap: 7px; flex-wrap: wrap; }
.swatches button {
  width: 26px; height: 26px; border-radius: 8px; cursor: pointer;
  border: 2px solid transparent; background-clip: padding-box;
  position: relative; transition: transform .12s var(--ease-standard);
}
.swatches button:hover { transform: scale(1.08); }
.swatches button.sel { border-color: #fff; }
.swatches button .none { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:9px; color:var(--fg-2); }

.reset {
  width: 100%; margin-top: 14px; padding: 11px; cursor: pointer;
  background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12);
  border-radius: 10px; color: var(--text-2); font-family: var(--font-jp);
  font-weight: 600; font-size: 12px; transition: all .18s;
}
.reset:hover { background: rgba(255,255,255,.1); color: var(--text-1); }

.note { font-size: 10.5px; line-height: 1.6; color: var(--fg-3); margin-top: 12px; }
.note code { font-family: var(--font-latin); color: var(--text-2); background: rgba(255,255,255,.06); padding: 1px 5px; border-radius: 4px; font-size: 10px; }

/* loading veil */
#veil {
  position: absolute; inset: 0; z-index: 80; display: flex; align-items: center; justify-content: center;
  background: var(--bg); transition: opacity .8s var(--ease-out);
  font-family: var(--font-display); font-size: 26px; color: rgba(255,255,255,.85);
}
#veil.gone { opacity: 0; pointer-events: none; }
#veil .spin {
  width: 42px; height: 42px; border-radius: 50%; margin-left: 14px;
  border: 2px solid rgba(255,255,255,.18); border-top-color: #fff;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ============================================================================
   3D OVERLAY  (objects3d.js) — screen-space markers + focus/orbit chrome
   ========================================================================== */
.o3d-scrim {
  /* sits just ABOVE the map/globe but BELOW all floating app chrome
     (playlist 31/46 · side-tool 50 · post 55 · statusbar 60), so focusing
     an object darkens only the MAP — the UI stays lit and in front. */
  position: absolute; inset: 0; z-index: 5; pointer-events: none;
  background: var(--scrim); opacity: 0;
}
.o3d-chrome { position: absolute; inset: 0; z-index: 58; pointer-events: none; opacity: 0; }

/* While a 3D object is focused, lift the interactive app chrome ABOVE the
   focused canvas (z57) + chrome (z58) so the circle list, side-tool rail and
   post button stay tappable — and because their own handlers never close the
   focus, tapping them leaves the focus open. (Status bar 60 / island 70 stay
   on top.) Empty/object area still orbits & tap-to-closes via the canvas. */
.screen.o3d-focus-active .playlist,
.screen.o3d-focus-active .wd-side-tool,
.screen.o3d-focus-active .post-btn { z-index: 59; }
.o3d-close {
  position: absolute; top: 72px; right: 18px; width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  border: 0; border-radius: 50%; pointer-events: auto;
  background: var(--glass-fill);
  backdrop-filter: blur(8px) saturate(140%); -webkit-backdrop-filter: blur(8px) saturate(140%);
  transition: transform .12s var(--ease-out);
}
.o3d-close::after {
  content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1px;
  background: var(--gradient-border);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
}
.o3d-close:active { transform: scale(.92); }
.o3d-hint {
  position: absolute; left: 50%; bottom: 116px; transform: translateX(-50%);
  font-family: var(--font-jp); font-weight: 600; font-size: 12px; color: var(--text-2);
  letter-spacing: .02em; white-space: nowrap; text-shadow: 0 1px 4px rgba(0,0,0,.8);
  padding: 7px 15px; border-radius: var(--radius-pill);
  background: rgba(0,0,0,.34); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  transition: opacity .3s var(--ease-out);
}

/* ============================================================================
   周辺オブジェクト指標 — off-screen neighbour edge indicators (objects3d.js)
   画面の淵に沿ってクランプした小さなグラス・チップが、画面外にある近隣オブジェクトの
   *方向*(矢印) と *距離* を提示する。チップの中身は対象 3D の実ポートレート。
   z4: bg(0) < map(1) < EDGE(4) < o3d-scrim(5) < 3D markers(6) < scrim/chrome …
   → 実 3D マーカーや app chrome（オーバーレイ）の「下の層」に潜り、淵で重なる時は
     その後ろへ回り込む。
   ========================================================================== */
.o3d-edge { position: absolute; inset: 0; z-index: 4; pointer-events: none; --ei-size: 40px; }
.o3d-edge-chip {
  position: absolute; left: 0; top: 0; will-change: transform;
  padding: 0; border: 0; background: none; cursor: pointer; pointer-events: none;
  opacity: 0; transition: opacity .3s var(--ease-out);
  -webkit-tap-highlight-color: transparent;
}
.o3d-edge-chip.on { opacity: 1; pointer-events: auto; }

/* pulse ring (chip-level so it isn't clipped by the disc) */
.o3d-edge-chip::before {
  content: ""; position: absolute; left: 50%; top: 50%;
  width: var(--ei-size); height: var(--ei-size); border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,.55); transform: translate(-50%,-50%);
  opacity: 0; pointer-events: none;
}
.o3d-edge--pulse .o3d-edge-chip.on::before { animation: ei-ping 2.8s var(--ease-out) infinite; }
@keyframes ei-ping {
  0%   { transform: translate(-50%,-50%) scale(1);   opacity: .55; }
  70%  { transform: translate(-50%,-50%) scale(1.7); opacity: 0; }
  100% { transform: translate(-50%,-50%) scale(1.7); opacity: 0; }
}
@media (prefers-reduced-motion: reduce) { .o3d-edge--pulse .o3d-edge-chip.on::before { animation: none; } }

/* the glass disc holding the object's portrait */
.o3d-edge-chip .disc {
  position: relative; display: block; width: var(--ei-size); height: var(--ei-size);
  border-radius: 50%; overflow: hidden;
  background: var(--lg-tint-dark, rgba(8,8,12,.55));
  backdrop-filter: blur(10px) saturate(150%); -webkit-backdrop-filter: blur(10px) saturate(150%);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.16), 0 6px 18px rgba(0,0,0,.5);
  transition: transform .12s var(--ease-out);
}
.o3d-edge-chip:active .disc { transform: scale(.9); }
.o3d-edge-chip .disc::after {
  content: ""; position: absolute; inset: 0; border-radius: 50%; padding: 1px;
  background: var(--gradient-border);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
}
.o3d-edge-chip .disc img {
  width: 100%; height: 100%; object-fit: contain; display: block;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,.5));
}
/* directional chevron — JS sets transform (rotate to true bearing, push outward) */
.o3d-edge-chip .arrow {
  position: absolute; left: 50%; top: 50%; width: 0; height: 0;
  border-top: 5px solid transparent; border-bottom: 5px solid transparent;
  border-left: 8px solid #fff; transform-origin: center;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,.65));
}
/* distance readout (large value + small unit — DS numeral convention) */
.o3d-edge-chip .dist {
  position: absolute; left: 50%; top: calc(var(--ei-size) + 8px); transform: translateX(-50%);
  font-family: var(--font-latin); font-weight: 700; font-size: 12px; line-height: 1; color: #fff;
  letter-spacing: .01em; white-space: nowrap; text-shadow: 0 1px 4px rgba(0,0,0,.85);
  font-variant-numeric: tabular-nums;
}
.o3d-edge-chip .dist i { font-style: normal; font-size: 8px; font-weight: 600; opacity: .82; margin-left: 1px; }
.o3d-edge--nodist .o3d-edge-chip .dist { display: none; }
/* when a chip bleeds past the rim, push its distance label to the INNER side so it stays on-screen */
.o3d-edge-chip.edge-l .dist { left: calc(var(--ei-size) + 7px); top: 50%; transform: translateY(-50%); }
.o3d-edge-chip.edge-r .dist { left: auto; right: calc(var(--ei-size) + 7px); top: 50%; transform: translateY(-50%); }
.o3d-edge-chip.edge-b .dist { top: auto; bottom: calc(var(--ei-size) + 8px); }

/* style: arrow-only — drop the disc, enlarge the chevron, sit it on the border */
.o3d-edge--arrow .o3d-edge-chip .disc,
.o3d-edge--arrow .o3d-edge-chip::before { display: none; }
.o3d-edge--arrow .o3d-edge-chip .arrow {
  border-top-width: 8px; border-bottom-width: 8px; border-left-width: 13px;
}
/* style: dot — a small luminous point */
.o3d-edge--dot .o3d-edge-chip .disc {
  width: 13px; height: 13px; background: #fff;
  backdrop-filter: none; -webkit-backdrop-filter: none;
  box-shadow: 0 0 0 3px rgba(255,255,255,.18), 0 0 10px rgba(255,255,255,.55), 0 2px 6px rgba(0,0,0,.6);
  margin: calc((var(--ei-size) - 13px) / 2);
}
.o3d-edge--dot .o3d-edge-chip .disc img,
.o3d-edge--dot .o3d-edge-chip .disc::after { display: none; }
.o3d-edge--dot .o3d-edge-chip::before { width: 13px; height: 13px; }

/* segmented control inside the tuning panel */
.seg { display: flex; gap: 5px; }
.seg button {
  flex: 1; appearance: none; cursor: pointer; padding: 7px 4px; border-radius: 8px;
  border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.05);

  transition: all .15s var(--ease-standard);
}
.seg button:hover { color: var(--text-1); }
.seg button.sel { background: rgba(255,255,255,.16); color: #fff; border-color: rgba(255,255,255,.28); }
</style>
</head>

<script>
  /* circle playlist: tap a cell → promote to representative (white frame) + fire uv:select.
     post button → fire uv:post. (Host wires these to 3D swap / composer in the app.) */
  (function () {
    const playlist = document.getElementById('playlist');
    if (playlist) {
      playlist.addEventListener('click', (e) => {
        const cell = e.target.closest('.cell');
        if (!cell) return;
        playlist.querySelectorAll('.cell.rep').forEach(c => c.classList.remove('rep'));
        cell.classList.add('rep');
        cell.dispatchEvent(new CustomEvent('uv:select', { bubbles: true, detail: { circle: cell.getAttribute('data-circle') } }));
      });
    }
    const postBtn = document.querySelector('.post-btn');
    if (postBtn) postBtn.addEventListener('click', () => postBtn.dispatchEvent(new CustomEvent('uv:post', { bubbles: true })));

    /* WdSideTool — like のタップでトグル（.liked + カウント増減） */
    const likeAct = document.querySelector('.wd-side-tool .act[data-act="like"]');
    if (likeAct) {
      const ct = likeAct.querySelector('.ct');
      likeAct.querySelector('.wd-icon-btn').addEventListener('click', () => {
        const liked = likeAct.classList.toggle('liked');
        ct.textContent = liked ? '1.3k' : '1.2k';
        likeAct.dispatchEvent(new CustomEvent('uv:like', { bubbles: true, detail: { liked } }));
      });
    }
  })();
</script>

<!-- ============================================================================
  3D ON MAP — 画面空間オーバーレイで実 3D 投稿 (real-NN.glb) を表示

  EXT_meshopt_compression のため MeshoptDecoder.ready を待ってから init する。
  ============================================================================ -->

  (async function () {
    // GLB は本番 Firebase Storage の公開 URL を直接参照する（CORS: * なので Claude Design の

      { id: 'real-04', lat: 35.66527163126798, lng: 139.70095538623644, url: 'https://firebasestorage.googleapis.com/v0/b/toopdbq.appspot.com/o/story%2F353711cd-ac35-4de2-9955-6456270e6e3d%2F353711cd-ac35-4de2-9955-6456270e6e3d.glb?alt=media&token=835211dc-c26a-4cf8-8f65-13b4d0c34ced' },

      { id: 'real-06', lat: 35.695838793359414, lng: 139.7662216045701, url: 'https://firebasestorage.googleapis.com/v0/b/toopdbq.appspot.com/o/story%2F7fa30005-fed9-45d8-8aed-780aee8b5a2c%2F7fa30005-fed9-45d8-8aed-780aee8b5a2c.glb?alt=media&token=1db6cf4c-763a-4c84-9e69-83c3a596a600' },

      { id: 'real-11', lat: 35.66566109829807, lng: 139.70101954247983, url: 'https://firebasestorage.googleapis.com/v0/b/toopdbq.appspot.com/o/story%2Fe42972fe-8884-4863-9fd9-0d1642c738e6%2Fe42972fe-8884-4863-9fd9-0d1642c738e6.glb?alt=media&token=6d048a08-4750-4c21-ac79-295e29e329a7' },
    ];
    if (window.MeshoptDecoder && MeshoptDecoder.ready) await MeshoptDecoder.ready;

    const screen = document.querySelector('.phone .screen');
    function boot() {
      if (!window.EarthMap || !window.EarthMap.map || !window.Objects3D) { setTimeout(boot, 100); return; }
      window.Objects3D.init({
        getMap: () => window.EarthMap.map,
        container: screen,
        models: POSTS,           // {id,lat,lng,url} — 画面空間オーバーレイが各点を毎フレ project して一定サイズで描画。
      });
    }
    boot();
  })();
</script>
