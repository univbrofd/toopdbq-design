<!-- @dsCard group="Onboarding" name="Onboarding · 05 まとめ" subtitle="5つの不変概念を1枚に束ねる" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
<link rel="stylesheet" href="components.css">
<link rel="stylesheet" href="onboarding.css">
<style>
  body { background:#0d0d0f; display:grid; place-items:center; min-height:100vh; padding:28px; }
  /* DS specimen = settled, static state. Motion lives in comp-onboarding-flow.html.
     The dot's active pill is the colorful gradient; entrance/loops are inert here. */
  .ob-dots i.on { width:22px; background:var(--gradient-colorful-linear); }
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar">
    <span class="time">9:41</span>
    <span class="sys">
      <svg class="bars" viewBox="0 0 18 12" fill="#fff"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2.5" width="3" height="9.5" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
      <svg class="wifi" viewBox="0 0 17 12" fill="#fff"><path d="M8.5 2.2c2.6 0 5 1 6.8 2.7l-1.5 1.6A7.4 7.4 0 0 0 8.5 6.3 7.4 7.4 0 0 0 3.2 6.5L1.7 4.9A9.7 9.7 0 0 1 8.5 2.2Zm0 3.8c1.5 0 3 .6 4.1 1.7l-1.6 1.7A3.6 3.6 0 0 0 8.5 9.7c-.9 0-1.8.4-2.5 1l-1.6-1.7A5.7 5.7 0 0 1 8.5 6Zm0 3.4c.7 0 1.3.3 1.8.8L8.5 11.8 6.7 10.2c.5-.5 1.1-.8 1.8-.8Z"/></svg>
      <svg class="batt" viewBox="0 0 25 13" fill="none"><rect x="0.5" y="0.8" width="21" height="11.4" rx="3" stroke="#fff" stroke-opacity=".4"/><rect x="2" y="2.3" width="16.5" height="8.4" rx="1.8" fill="#fff"/><path d="M23 4.2v4.6c1-.4 1-4.2 0-4.6Z" fill="#fff" fill-opacity=".5"/></svg>
    </span>
  </div>
  <button class="ob-skip">スキップ</button>
<section class="ob-screen" data-i="4">
      <div class="ob-bg map-stage">
        <div class="map-glow" style="opacity:.14; top:18%;"></div>
        <div class="map-tilt" style="opacity:.5;">
          <div class="roads"></div>
        </div>
      </div>
      <div class="ob-scrim" style="height:100%; background:linear-gradient(0deg,#08080b 30%,rgba(8,8,11,.86) 62%,rgba(8,8,11,.4) 100%);"></div>
      <div class="sum-wrap">
        <div class="sum-head">
          <div class="ob-eyebrow anim-up"><span class="idx">05</span><span class="bar"></span><span>まとめ</span></div>
          <h1 class="ob-title anim-up d1" style="font-size:27px;">Toopdbq の、<span class="glow">ぜんぶ。</span></h1>
        </div>
        <div class="sum-mid">
          <div class="sum-list anim-up d2">
            <div class="sum-row"><span class="n">1</span><span class="tx">サークルは、地図上の<b>場所</b>。</span></div>
            <div class="sum-row"><span class="n">2</span><span class="tx"><b>誰でも</b>つくれる。</span></div>
            <div class="sum-row"><span class="n">3</span><span class="tx">位置と、まわりの<b>範囲</b>を持つ。</span></div>
            <div class="sum-row key"><span class="n">4</span><span class="tx">範囲の<b>中</b>にいる人だけが、<b>投稿</b>できる。</span></div>
            <div class="sum-row key"><span class="n">5</span><span class="tx"><b>外</b>からは、<b>閲覧</b>だけ。</span></div>
          </div>
        </div>
        <div class="ob-nav anim-up d3" style="margin-top:18px;">
          <div class="ob-dots" data-dots></div>
          <button class="ob-cta" data-next>はじめる<svg class="arr" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
        </div>
      </div>
    </section>
  <div class="home-ind"></div>
</div>
<script>
(function(){
  var sec=document.querySelector('.ob-screen'); var i=+sec.getAttribute('data-i');
  var h=document.querySelector('[data-dots]');
  if(h){ for(var k=0;k<6;k++){ var d=document.createElement('i'); if(k===i)d.className='on'; h.appendChild(d); } }
})();
</script>
</body>
</html>
