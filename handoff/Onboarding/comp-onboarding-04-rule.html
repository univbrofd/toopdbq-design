<!-- @dsCard group="Onboarding" name="Onboarding · 04 投稿のルール" subtitle="iPhone17。グリッド無し。中＝投稿／外＝閲覧だけ" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
<link rel="stylesheet" href="components.css">
<link rel="stylesheet" href="onboarding.css">
<style>
  body { background:#0d0d0f; display:grid; place-items:center; min-height:100vh; padding:28px; }
  .ob-dots i.on { width:22px; background:var(--gradient-colorful-linear); }
</style>
</head>
<body>
<div class="phone">
  <div class="dynamic-island"></div>
  <div class="statusbar">
    <span class="time">9:41</span>
    <span class="sys">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="#fff"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2.5" width="3" height="9.5" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
      <svg width="17" height="12" viewBox="0 0 17 12" fill="#fff"><path d="M8.5 2.2c2.6 0 5 1 6.8 2.7l-1.5 1.6A7.4 7.4 0 0 0 8.5 6.3 7.4 7.4 0 0 0 3.2 6.5L1.7 4.9A9.7 9.7 0 0 1 8.5 2.2Zm0 3.8c1.5 0 3 .6 4.1 1.7l-1.6 1.7A3.6 3.6 0 0 0 8.5 9.7c-.9 0-1.8.4-2.5 1l-1.6-1.7A5.7 5.7 0 0 1 8.5 6Zm0 3.4c.7 0 1.3.3 1.8.8L8.5 11.8 6.7 10.2c.5-.5 1.1-.8 1.8-.8Z"/></svg>
      <svg width="25" height="13" viewBox="0 0 25 13" fill="none"><rect x="0.5" y="0.8" width="21" height="11.4" rx="3" stroke="#fff" stroke-opacity=".4"/><rect x="2" y="2.3" width="16.5" height="8.4" rx="1.8" fill="#fff"/><path d="M23 4.2v4.6c1-.4 1-4.2 0-4.6Z" fill="#fff" fill-opacity=".5"/></svg>
    </span>
  </div>
  <button class="ob-skip">スキップ</button>
<section class="ob-screen" data-i="3">
      <div class="ob-bg map-stage">
        <div class="map-glow" style="opacity:.16; top:36%;"></div>
        <div class="rule-stage">
          <div class="rule-circle" style="top:355px; width:262px; height:262px;">
            <span class="ring-lab">サークルの範囲</span>
          </div>
          <!-- inside actor: can post -->
          <div class="actor inside anim-up d1" style="left:50%; top:232px; transform:translateX(-50%);">
            <img class="av" src="../assets/images/sample_photo.png" alt="">
            <span class="chip"><img src="../assets/icons/icon_camera.png" alt="">投稿できる</span>
          </div>
          <!-- outside actor: view only -->
          <div class="actor outside anim-up d2" style="left:50%; top:432px; transform:translateX(-50%);">
            <img class="av" src="../assets/images/sample_3d.png" alt="">
            <span class="chip"><img src="../assets/icons/icon_explore.png" alt="">閲覧だけ</span>
          </div>
        </div>
      </div>
      <div class="ob-scrim"></div>
      <div class="ob-foot">
        <div class="ob-eyebrow anim-up"><span class="idx">04</span><span class="bar"></span><span>投稿のルール</span></div>
        <h1 class="ob-title anim-up d1">中にいる人だけが、<span class="glow">投稿</span>できる。</h1>
        <p class="ob-body anim-up d2">外からは、読むだけ。「いま、そこにいる人の声」だから、信じられる。</p>
        <div class="ob-nav anim-up d3">
          <div class="ob-dots" data-dots></div>
          <button class="ob-cta" data-next>次へ<svg class="arr" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
        </div>
      </div>
    </section>
  <div class="home-ind"></div>
</div>
<script>(function(){var sec=document.querySelector('.ob-screen');var i=+sec.getAttribute('data-i');var h=document.querySelector('[data-dots]');if(h){for(var k=0;k<6;k++){var d=document.createElement('i');if(k===i)d.className='on';h.appendChild(d);}}})();</script>
</body>
</html>
