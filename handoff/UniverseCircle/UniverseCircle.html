<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Universe-Circle</title>

<!-- Toopdbq DS tokens (colors / type / fonts) -->
<link rel="stylesheet" href="../../DesignSystem/colors_and_type.css" />
<!-- MapLibre GL JS — the real rendering engine (positron + globe projection) -->
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css" />
<script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; min-height: 100%;
  background:
    radial-gradient(120% 90% at 50% -10%, #16161d 0%, #0d0d0f 55%, #08080b 100%);
  color: var(--text-1);
  font-family: var(--font-latin);
  -webkit-font-smoothing: antialiased;
}
.studio {
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 20px; padding: 40px 36px 64px;
}
.stage { display: flex; flex-direction: column; align-items: center; gap: 20px; }

.specimen-cap { text-align: center; max-width: 402px; }
.specimen-cap .eyebrow {
  font-weight: 600; font-size: 10px; letter-spacing: .16em; text-transform: uppercase;
  color: var(--fg-3);
}
.specimen-cap h1 {
  font-family: var(--font-jp); font-weight: 700; font-size: 17px; margin-top: 6px;
  color: var(--text-1);
}
.specimen-cap p { font-size: 11.5px; line-height: 1.55; color: var(--fg-2); margin-top: 7px; }

/* iPhone 17 frame  (402×874 · r55 · Dynamic Island) */
.phone {
  position: relative; width: 402px; height: 874px; flex: none;
  border-radius: 55px; overflow: hidden; background: var(--bg);
  box-shadow: 0 0 0 2px #2a2a31, 0 0 0 12px #0a0a0e, 0 0 0 13px #303039,
              0 36px 90px rgba(0,0,0,.62);
  isolation: isolate;
}
.phone .screen { position: absolute; inset: 0; overflow: hidden; }

/* L0  space backdrop */
#bg-white {
  position: absolute; inset: 0; z-index: 0;
  background:
    radial-gradient(125% 120% at 50% 38%,
      var(--space-core)  0%,
      var(--space-mid)   46%,
      var(--space-edge)  100%);
  transition: opacity .6s var(--ease-out);
}

/* L0  the MapLibre canvas (positron sphere) */
#map { position: absolute; inset: 0; z-index: 1; background: transparent;
  filter: saturate(1.08); }
#map .maplibregl-canvas { outline: none; }
.maplibregl-ctrl-attrib { font-family: var(--font-latin); }
.maplibregl-ctrl-bottom-right { bottom: 36px; }
.maplibregl-ctrl-attrib.maplibregl-compact { background: rgba(0,0,0,.35); }
.maplibregl-ctrl-attrib a { color: rgba(255,255,255,.6); }

/* L0.5  atmosphere ring */
#strato-shadow {
  position: absolute; left: 50%; top: 50%; z-index: 2;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  pointer-events: none;
  background: radial-gradient(closest-side,
      transparent calc(100% - var(--atmo-thickness) - var(--atmo-blur)),
      var(--atmo-color) calc(100% - var(--atmo-thickness)),
      transparent 100%);
  opacity: 0;
  will-change: width, height, opacity;
}

/* L0.6  globe edge */
#globe-frame {
  position: absolute; left: 50%; top: 50%; z-index: 3;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  pointer-events: none;
  border: var(--frame-width) solid rgba(255,255,255,var(--frame-opacity));
  filter: blur(var(--frame-blur));
  box-shadow: 0 0 calc(var(--frame-blur) * 4) rgba(255,255,255,calc(var(--frame-opacity) * .5));
  opacity: 0;
  will-change: width, height, opacity;
}

/* center marker (青ドット + グロー) */
.center-marker { position: relative; width: 0; height: 0; pointer-events: none; }
.center-marker .glow {
  position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
  width: calc(var(--marker-size) * 3.6); height: calc(var(--marker-size) * 3.6);
  border-radius: 50%;
  background: radial-gradient(closest-side, var(--marker-color) 0%, transparent 72%);
  opacity: var(--marker-glow);
  filter: blur(1px);
}
.center-marker .ping {
  position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
  width: var(--marker-size); height: var(--marker-size); border-radius: 50%;
  border: 1.5px solid var(--marker-color);
  animation: ping 2.6s var(--ease-out) infinite;
}
.center-marker .dot {
  position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
  width: var(--marker-size); height: var(--marker-size); border-radius: 50%;
  background: var(--marker-color);
  box-shadow: 0 0 0 2px rgba(255,255,255,.9), 0 2px 8px rgba(0,0,0,.7);
}
@keyframes ping {
  0%   { transform: translate(-50%,-50%) scale(1);   opacity: .9; }
  70%  { transform: translate(-50%,-50%) scale(3.2);  opacity: 0; }
  100% { transform: translate(-50%,-50%) scale(3.2);  opacity: 0; }
}
@media (prefers-reduced-motion: reduce) { .center-marker .ping { animation: none; } }

/* protection scrims */
.scrim-top {
  position: absolute; top: 0; left: 0; right: 0; height: 150px; z-index: 40;
  background: linear-gradient(180deg, rgba(0,0,0,.55) 0%, rgba(0,0,0,.28) 42%, transparent 100%);
  pointer-events: none;
}
.scrim-bottom {
  position: absolute; bottom: 0; left: 0; right: 0; height: 130px; z-index: 40;
  background: linear-gradient(0deg, rgba(0,0,0,.5) 0%, transparent 100%);
  pointer-events: none;
}

/* WdNavigationHeader — selected circle title, centered glass pill */
.nav-header {
  position: absolute; top: 66px; left: 50%; transform: translateX(-50%); z-index: 55;
  display: inline-flex; align-items: center; justify-content: center;
  max-width: 82%; padding: 9px 6px;
  pointer-events: none;
}
.nav-header .nh-title {
  font: 300 24px var(--font-jp); color: #fff; letter-spacing: .01em; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; text-shadow: 0 1px 6px rgba(0,0,0,.7);
}

/* SafeArea chrome */
.dynamic-island {
  position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
  width: 125px; height: 36px; border-radius: 20px; background: #000; z-index: 70;
  pointer-events: none;
}
.statusbar {
  position: absolute; top: 0; left: 0; right: 0; height: 62px; z-index: 60;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 36px; pointer-events: none; color: #fff;
}
.statusbar .time { font-weight: 600; font-size: 16px; letter-spacing: .02em; }
.statusbar .sys { display: flex; align-items: center; gap: 7px; }
.statusbar .sys svg { display: block; }
.home-ind {
  position: absolute; left: 50%; bottom: 8px; transform: translateX(-50%);
  width: 140px; height: 5px; border-radius: 99px; background: rgba(255,255,255,.9);
  z-index: 60; pointer-events: none;
}

/* PRESET RAIL (Globe · Region · Street+3D) */
.preset-rail {
  display: flex; gap: 8px; padding: 6px;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.10);
  border-radius: var(--radius-pill);
  backdrop-filter: blur(14px) saturate(160%);
}
.preset-rail button {
  appearance: none; border: 0; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  padding: 10px 18px; border-radius: var(--radius-pill);
  font-family: var(--font-jp); font-weight: 700; font-size: 13px; color: var(--text-2);
  background: transparent; transition: all .2s var(--ease-standard);
}
.preset-rail button .ico { font-size: 16px; line-height: 1; }
.preset-rail button:hover { color: var(--text-1); }
.preset-rail button.active {
  color: #fff;
  background:
    linear-gradient(rgba(0,0,0,.25), rgba(0,0,0,.25)),
    var(--gradient-colorful);
  box-shadow: 0 2px 12px rgba(255,62,136,.28);
}
.hint { font-size: 11px; color: var(--fg-3); letter-spacing: .02em; }

/* legend (領域境界 / オーロラの柱) — glass chip, bottom-left */
.legend {
  position: absolute; left: 18px; bottom: 30px; z-index: 45;
  padding: 13px 15px; border-radius: 16px; pointer-events: none;
  background: rgba(6,10,18,.46);
  backdrop-filter: blur(14px) saturate(150%);
  -webkit-backdrop-filter: blur(14px) saturate(150%);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.14), 0 10px 30px rgba(0,0,0,.5);
}
.legend::after {
  content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1px;
  background: linear-gradient(135deg, rgba(123,108,255,.7), rgba(75,227,176,.7));
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
}
.legend .lg-title {
  font-family: var(--font-jp); font-weight: 700; font-size: 11.5px; color: #fff;
  letter-spacing: .01em; margin-bottom: 9px; text-shadow: 0 1px 4px rgba(0,0,0,.8);
}
.legend .lg-row {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-jp); font-weight: 600; font-size: 11px; color: rgba(255,255,255,.9);
  text-shadow: 0 1px 3px rgba(0,0,0,.8); margin-top: 5px;
}
.legend .lg-row i { font-style: normal; font-family: var(--font-latin); font-size: 9px; color: rgba(255,255,255,.55); letter-spacing: .04em; }
.legend .lg-swatch { width: 20px; height: 4px; border-radius: 3px; flex: none; }
.legend .lg-swatch.wall {
  background: linear-gradient(90deg, #4be3b0, #3fd0e0, #7b6cff);
  box-shadow: 0 0 8px rgba(90,220,200,.8);
}
.legend .lg-swatch.pillar {
  width: 4px; height: 16px;
  background: linear-gradient(180deg, #b06cff, #5effc7);
  box-shadow: 0 0 8px rgba(150,110,255,.85);
}

/* ============================================================
   COVERFLOW — the photo list itself. The center card faces front
   and is enlarged; side cards tilt/fold back in 3D. Drag or wheel
   to scroll; the centered card is the "front" one.
   ============================================================ */
.reel {
  position: absolute; left: 0; right: 0; top: 340px; z-index: 46; height: 460px;
  perspective: 1250px; overflow: hidden; touch-action: pan-y; cursor: grab;
  -webkit-tap-highlight-color: transparent;
  /* let cards that swing past the edges fade out naturally */
  -webkit-mask: linear-gradient(to right, transparent 0, #000 16%, #000 84%, transparent 100%);
          mask: linear-gradient(to right, transparent 0, #000 16%, #000 84%, transparent 100%);
}
.reel.grabbing { cursor: grabbing; }
.cf-card {
  position: absolute; left: 50%; top: 50%; width: 164px; height: 292px; margin: -146px 0 0 -82px;
  border-radius: 16px; overflow: hidden; background: #16161b;
  will-change: transform, opacity; transform-origin: center center; backface-visibility: hidden;
}
.cf-card > img, .cf-card > video { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }
.cf-card .cf-vid {
  position: absolute; top: 10px; right: 10px; width: 26px; height: 26px; border-radius: 50%;
  background: rgba(0,0,0,.42); backdrop-filter: blur(6px) saturate(140%); -webkit-backdrop-filter: blur(6px) saturate(140%);
  display: flex; align-items: center; justify-content: center; pointer-events: none;
  transition: opacity .2s var(--ease-out);
}
.cf-card .cf-vid::after {
  content: ""; width: 0; height: 0; margin-left: 2px;
  border-left: 8px solid #fff; border-top: 5px solid transparent; border-bottom: 5px solid transparent;
}
.cf-card::after {
  content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1px; pointer-events: none;
  background: linear-gradient(150deg, rgba(255,255,255,.5), rgba(255,255,255,.08) 46%, rgba(255,255,255,.18));
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
}
.cf-card .cf-cap {
  position: absolute; left: 0; right: 0; bottom: 0; padding: 18px 14px 15px; opacity: 0; pointer-events: none;
  transition: opacity .22s var(--ease-out);
  background: linear-gradient(0deg, rgba(0,0,0,.82) 0%, rgba(0,0,0,.34) 54%, transparent 100%);
}
.cf-card .cf-cap b { display: block; font: 700 15px var(--font-jp); color: #fff; letter-spacing: .01em;
  text-shadow: 0 1px 5px rgba(0,0,0,.85); }
.cf-card .cf-cap span { display: block; margin-top: 3px; font: 600 11px var(--font-jp); color: rgba(255,255,255,.82);
  text-shadow: 0 1px 4px rgba(0,0,0,.85); }

/* ============================================================
   WdIconButton (variant: badge) — main icon = camera, badge = add.
   Dark liquid-glass face + colorful gradient rim; glass badge notch
   top-right carries the add icon. Floats over the active area,
   following the front card of the deck.
   ============================================================ */
.wd-cam-btn {
  position: absolute; left: 12px; top: 68px; z-index: 47;
  width: 58px; height: 58px; border-radius: 50%; flex: none; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  appearance: none; -webkit-appearance: none; border: 0;
  background: var(--lg-tint-dark);
  backdrop-filter: blur(var(--lg-blur)) saturate(var(--lg-saturate));
  -webkit-backdrop-filter: blur(var(--lg-blur)) saturate(var(--lg-saturate));
  box-shadow: inset 0 1px 0 var(--lg-specular-top), var(--lg-shadow);
  transition: transform .12s var(--ease-standard), filter .12s var(--ease-standard);
}
.wd-cam-btn::after {                 /* colorful theme rim (badgeColor) */
  content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1.5px; pointer-events: none;
  background: var(--gradient-colorful-linear);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
}
.wd-cam-btn:active { transform: scale(.94); filter: brightness(.94); }
.wd-cam-btn .mi { width: 46%; height: 46%; object-fit: contain; position: relative;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,.5)); }
.wd-cam-btn .badge {                 /* glass badge — cut out from host with a 2px ring gap */
  position: absolute; top: -3px; right: -3px; width: 23px; height: 23px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: var(--glass-fill); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  box-shadow: 0 0 0 2px var(--lg-tint-dark);
}
.wd-cam-btn .badge::after {          /* hairline rim on the badge */
  content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1px; pointer-events: none;
  background: var(--gradient-border);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
}
.wd-cam-btn .badge img { width: 11px; height: 11px; object-fit: contain; }

/* ============================================================
   CIRCLE LIST — bottom sheet of nearby circles you can focus.
   Adapted from CircleList.dc.html. Tap a row → the camera flies
   there, its area lights up, its deck + circle bar swap in.
   Selected row = bright white ring.
   ============================================================ */
.circle-sheet {
  position: absolute; left: 0; right: 0; bottom: 0; z-index: 50;
  border-radius: 26px 26px 0 0; overflow: hidden;
  background: rgba(10,10,14,0.82);
  -webkit-backdrop-filter: blur(18px) saturate(160%); backdrop-filter: blur(18px) saturate(160%);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.14), inset 0 0 0 1px rgba(255,255,255,0.07);
}
.circle-sheet .cs-grip {
  width: 38px; height: 5px; border-radius: 9999px; background: rgba(255,255,255,0.28);
  margin: 9px auto 2px;
}
.circle-sheet .cs-head {
  display: flex; align-items: baseline; gap: 8px; padding: 15px 18px 9px; white-space: nowrap;
}
.circle-sheet .cs-head b { font: 700 14px var(--font-jp); color: #fff; letter-spacing: .01em; }
.circle-sheet .cs-head i {
  font-style: normal; font: 600 10px var(--font-latin); letter-spacing: .05em; color: rgba(255,255,255,.5);
  display: flex; align-items: center; gap: 5px;
}
.circle-sheet .cs-head i::before {
  content: ""; width: 5px; height: 5px; border-radius: 50%; background: #00c6d8; box-shadow: 0 0 6px #00c6d8;
}
.cs-rows {
  max-height: 214px; overflow-y: auto; padding: 8px 14px 34px;
  display: flex; flex-direction: column; gap: 4px;
  -webkit-overflow-scrolling: touch; overscroll-behavior: contain; scrollbar-width: none;
  transition: max-height .34s var(--ease-standard);
}
.cs-rows::-webkit-scrollbar { display: none; }
.circle-sheet.expanded .cs-rows { max-height: 560px; }
.cs-row {
  display: flex; align-items: center; gap: 13px; width: 100%; text-align: left; cursor: pointer;
  padding: 8px 10px; border-radius: 15px; border: 1px solid transparent; background: rgba(255,255,255,0.05);
  transition: background .15s var(--ease-standard), border-color .15s var(--ease-standard), transform .15s var(--ease-standard);
  -webkit-tap-highlight-color: transparent; appearance: none;
}
.cs-row:active { transform: scale(.99); }
.cs-row.sel {
  border-color: rgba(255,255,255,0.95);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.9), 0 0 16px rgba(255,255,255,0.55);
}
.cs-row .cs-thumb-wrap { position: relative; flex: none; }
.cs-row .cs-thumb {
  width: 46px; height: 46px; border-radius: 12px; object-fit: cover; display: block;
  box-shadow: 0 2px 8px rgba(0,0,0,0.7);
}
.cs-row .cs-badge {
  position: absolute; top: -5px; left: -5px; z-index: 2;
  padding: 1.5px 6px; border-radius: 9999px; background: #ffffff;
  font: 700 8.5px var(--font-jp); color: #0c0c10; white-space: nowrap;
  box-shadow: 0 1px 4px rgba(0,0,0,0.5);
}
.cs-row .cs-mid { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.cs-row .cs-nameline { display: flex; align-items: baseline; gap: 9px; }
.cs-row .cs-name {
  font: 700 16px var(--font-jp); color: #fff; white-space: nowrap; flex: 0 1 auto;
  overflow: hidden; text-overflow: ellipsis;
}
.cs-row .cs-dist {
  flex: none; margin-left: auto; padding-left: 10px;
  font: 600 12px var(--font-latin); color: rgba(255,255,255,0.55); letter-spacing: .01em;
}
.cs-row .cs-desc {
  font: 500 12px var(--font-jp); color: rgba(255,255,255,0.66); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ============================================================
   WdIconButton (variant: badgeColor) — サークル追加 FAB.
   Dark liquid-glass face + colorful gradient rim; main icon =
   diversity, glass badge notch top-right carries the add icon.
   Pinned to the bottom-right corner of the community sheet.
   ============================================================ */
.wd-add-fab {
  position: absolute; right: 16px; bottom: 20px; z-index: 6;
  width: 54px; height: 54px; border-radius: 50%; flex: none; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  appearance: none; -webkit-appearance: none; border: 0;
  background: var(--lg-tint-dark);
  backdrop-filter: blur(var(--lg-blur)) saturate(var(--lg-saturate));
  -webkit-backdrop-filter: blur(var(--lg-blur)) saturate(var(--lg-saturate));
  box-shadow: inset 0 1px 0 var(--lg-specular-top), var(--lg-shadow);
  transition: transform .12s var(--ease-standard), filter .12s var(--ease-standard);
}
.wd-add-fab::after {                 /* colorful theme rim (badgeColor) */
  content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1.5px; pointer-events: none;
  background: var(--gradient-colorful-linear);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
}
.wd-add-fab:active { transform: scale(.94); filter: brightness(.94); }
.wd-add-fab .mi { width: 46%; height: 46%; object-fit: contain; position: relative;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,.5)); }
.wd-add-fab .badge {                 /* glass badge — cut out from host with a 2px ring gap */
  position: absolute; top: -3px; right: -3px; width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: var(--glass-fill); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  box-shadow: 0 0 0 2px var(--lg-tint-dark);
}
.wd-add-fab .badge::after {          /* hairline rim on the badge */
  content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1px; pointer-events: none;
  background: var(--gradient-border);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
}
.wd-add-fab .badge img { width: 11px; height: 11px; object-fit: contain; }

/* ============================================================
   DS COMPONENTS — WdCircleBar · WdIconButton · WdIdentityTool
   (lifted from the Toopdbq design system components.css so the
   identity cluster reads as the real DS component)
   ============================================================ */
.wd-icon-btn {
  position: relative; display: inline-flex; align-items: center; justify-content: center;
  border-radius: 50%; background: var(--glass-fill);
  backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
  width: 47px; height: 47px; flex: none; cursor: pointer; border: none; -webkit-appearance: none; appearance: none;
  transition: transform .12s var(--ease-standard), opacity .12s var(--ease-standard);
}
.wd-icon-btn::after {
  content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1px;
  background: var(--gradient-border);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
}
.wd-icon-btn img { width: 44%; height: 44%; object-fit: contain; }
.wd-icon-btn:active { transform: scale(0.94); }
/* legacy glass surfaces re-pointed to the liquid-glass recipe */
.wd-icon-btn:not(.color) {
  background: var(--lg-tint);
  -webkit-backdrop-filter: blur(var(--lg-blur)) saturate(var(--lg-saturate));
  backdrop-filter: blur(var(--lg-blur)) saturate(var(--lg-saturate));
  box-shadow: inset 0 1px 0 var(--lg-specular-top),
              inset 0 -1px 0 var(--lg-specular-bot), var(--lg-shadow);
}
.wd-icon-btn:not(.color)::after { background: var(--lg-edge); }
/* colorful variant (badgeColor) */
.wd-icon-btn.color {
  background: var(--lg-tint-dark);
  backdrop-filter: blur(var(--lg-blur)) saturate(var(--lg-saturate));
  -webkit-backdrop-filter: blur(var(--lg-blur)) saturate(var(--lg-saturate));
  box-shadow: inset 0 1px 0 var(--lg-specular-top), var(--lg-shadow);
}
.wd-icon-btn.color::after { background: var(--gradient-colorful-linear); padding: 1.5px; }
.wd-icon-btn.color img { position: relative; filter: drop-shadow(0 1px 2px rgba(0,0,0,.5)); }

/* badge dot (glass) */
.wd-badge {
  position: absolute; top: -2px; right: -2px; width: 20px; height: 20px;
  border-radius: 50%; background: var(--glass-fill); backdrop-filter: blur(2px);
  display: flex; align-items: center; justify-content: center;
}
.wd-badge::after {
  content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1px;
  background: var(--gradient-border);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
}
.wd-badge img { width: 11px; height: 11px; }
/* badge notch — cut the host circle behind the badge so the rim never shows through */
.wd-icon-btn.color.has-badge::before {
  content: ""; position: absolute; inset: 0; border-radius: inherit; pointer-events: none;
  background: var(--lg-tint-dark);
  -webkit-backdrop-filter: blur(var(--lg-blur)) saturate(var(--lg-saturate));
  backdrop-filter: blur(var(--lg-blur)) saturate(var(--lg-saturate));
  box-shadow: inset 0 1px 0 var(--lg-specular-top), var(--lg-shadow);
  -webkit-mask: radial-gradient(circle at calc(100% - 8px) 8px, rgba(0,0,0,0) 12px, #000 12.6px);
  mask: radial-gradient(circle at calc(100% - 8px) 8px, rgba(0,0,0,0) 12px, #000 12.6px);
}
.wd-icon-btn.color.has-badge { background: transparent; box-shadow: none; backdrop-filter: none; -webkit-backdrop-filter: none; }
.wd-icon-btn.has-badge::after {
  -webkit-mask:
    radial-gradient(circle at calc(100% - 8px) 8px, rgba(0,0,0,0) 12px, #000 12.6px),
    linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: source-in, xor;
  mask:
    radial-gradient(circle at calc(100% - 8px) 8px, rgba(0,0,0,0) 12px, #000 12.6px),
    linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: intersect, exclude;
}

/* WdCircleBar — glass identity pill */
.wd-circle-bar {
  position: relative; display: flex; align-items: center; gap: 8px; padding: 7px 16px 7px 7px;
  border-radius: var(--radius-pill);
  background:
    linear-gradient(90deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.34) 60%),
    var(--lg-tint);
  -webkit-backdrop-filter: blur(var(--lg-blur)) saturate(var(--lg-saturate));
  backdrop-filter: blur(var(--lg-blur)) saturate(var(--lg-saturate));
  box-shadow: inset 0 1px 0 var(--lg-specular-top),
              inset 0 -1px 0 var(--lg-specular-bot), var(--lg-shadow);
}
.wd-circle-bar::after {
  content: ""; position: absolute; inset: 0; border-radius: var(--radius-pill); padding: 1px;
  background: var(--lg-edge);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
}
.wd-circle-bar .cover { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; flex: none;
  box-shadow: 0 0 0 1.5px rgba(255,255,255,.35); }
.wd-circle-bar .col { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.wd-circle-bar .nm { font-family: var(--font-jp); font-weight: 700; font-size: 14px; color: #fff;
  text-shadow: 0 0 8px #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.wd-circle-bar .ds { font-family: var(--font-jp); font-weight: 500; font-size: 11px; color: var(--text-2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* WdIdentityTool — identity pill + camera/pen action stack.
   Docked just above the circle sheet; z-index sits BELOW the sheet (50)
   so an expanded sheet slides up and hides it. */
.wd-identity-tool {
  position: absolute; left: 50%; transform: translateX(-50%); z-index: 48;
  display: flex; align-items: flex-end; gap: 14px;
  width: calc(100% - 32px); max-width: 344px;
  transition: opacity .2s var(--ease-standard);
}
.wd-identity-tool .wd-circle-bar { flex: 1 1 auto; min-width: 0; padding-top: 2px; padding-bottom: 2px; }
.wd-identity-tool .stack { display: flex; flex-direction: column; gap: 12px; flex: none; }
.wd-identity-tool .stack .wd-icon-btn { width: 48px; height: 48px; }

/* サークル作成 FAB — WdIconButton standart (icon: add) */

/* loading veil */

  border: 2px solid rgba(255,255,255,.18); border-top-color: #fff;

}
@keyframes spin { to { transform: rotate(360deg); } }

(function () {

  const COMMUNITIES = [
    { name: '渋谷コミュニティ', desc: '渋谷駅周辺のコミュニティ', cover: '../../assets/sample/uv/circle-01.png', thumb: '../../assets/sample/uv/story-01.png',

    { name: '原宿コミュニティ', desc: '原宿・表参道エリア', cover: '../../assets/sample/uv/circle-03.png', thumb: '../../assets/sample/uv/story-08.png',
      dist: 1300, radius: 120, members: 132, inside: false,
      center: [139.70270, 35.67020], radiusM: 480,
      photos: [
        { img: '../../assets/sample/uv/story-08.png', title: '竹下通り' },
        { img: '../../assets/sample/uv/story-09.png', title: '表参道けやき並木' },
        { img: '../../assets/sample/uv/story-10.png', title: 'キャットストリート' },
      ] },
    { name: '恵比寿サークル', desc: '恵比寿・代官山エリア', cover: '../../assets/sample/uv/circle-04.png', thumb: '../../assets/sample/uv/story-06.png',
      dist: 1400, radius: 150, members: 96, inside: false,
      center: [139.71000, 35.64670], radiusM: 520,
      photos: [
        { img: '../../assets/sample/uv/story-01.png', title: '恵比寿横丁' },
        { img: '../../assets/sample/uv/story-06.png', title: 'ガーデンプレイス' },

      ] },
    { name: '代々木サークル', desc: '代々木公園エリア', cover: '../../assets/sample/uv/story-10.png', thumb: '../../assets/sample/uv/story-10.png',
      dist: 900, radius: 220, members: 64, inside: false,
      center: [139.69490, 35.67200], radiusM: 620,
      photos: [
        { img: '../../assets/sample/uv/story-10.png', title: '代々木公園' },
        { img: '../../assets/sample/uv/story-04.png', title: 'イベント広場' },
        { img: '../../assets/sample/uv/story-02.png', title: 'サイクリング' },
      ] },
    { name: '表参道フォト', desc: '表参道・青山エリア', cover: '../../assets/sample/uv/story-09.png', thumb: '../../assets/sample/uv/story-09.png',
      dist: 1200, radius: 120, members: 88, inside: false,
      center: [139.71240, 35.66560], radiusM: 460,
      photos: [
        { img: '../../assets/sample/uv/story-09.png', title: 'けやき並木' },
        { img: '../../assets/sample/uv/story-07.png', title: '青山通り' },
        { img: '../../assets/sample/uv/story-05.png', title: 'スパイラル' },
      ] },
  ];

  let activeIndex = 0;
  let activeCenter = COMMUNITIES[0].center;

  // ---- geometry helpers (mini turf) ---------------------------------------
  function dest(lng, lat, rM, a) {
    const dLat = rM / 111320, dLng = rM / (111320 * Math.cos(lat * Math.PI / 180));
    return [lng + dLng * Math.cos(a), lat + dLat * Math.sin(a)];
  }
  function ring(center, rM, n) {
    const out = [];
    for (let i = 0; i <= n; i++) out.push(dest(center[0], center[1], rM, i / n * 2 * Math.PI));
    return out;
  }
  function disk(center, rM) { return { type: 'Feature', geometry: { type: 'Polygon', coordinates: [ring(center, rM, 128)] } }; }
  function lineF(center, rM) { return { type: 'Feature', geometry: { type: 'LineString', coordinates: ring(center, rM, 128) } }; }
  function annulus(center, rOut, rIn) {
    return { type: 'Feature', geometry: { type: 'Polygon', coordinates: [ring(center, rOut, 160), ring(center, rIn, 160).reverse()] } };
  }
  function outside(C, R) {
    const box = [[C[0] - 0.4, C[1] - 0.4], [C[0] + 0.4, C[1] - 0.4], [C[0] + 0.4, C[1] + 0.4], [C[0] - 0.4, C[1] + 0.4], [C[0] - 0.4, C[1] - 0.4]];
    return { type: 'Feature', geometry: { type: 'Polygon', coordinates: [box, ring(C, R, 160).reverse()] } };
  }

  // ---- aurora area (data-driven so the same layers can relocate) ----------
  let areaReady = false;
  function areaAdd(map, C, R) {
    if (map.getSource('area-disk')) { areaReady = true; return; }
    const firstSymbol = (map.getStyle().layers.find(l => l.type === 'symbol') || {}).id;
    map.addSource('area-disk', { type: 'geojson', data: disk(C, R) });
    map.addSource('area-line', { type: 'geojson', data: lineF(C, R) });
    map.addSource('area-wall-core', { type: 'geojson', data: annulus(C, R + 6, R - 6) });
    map.addSource('area-outside', { type: 'geojson', data: outside(C, R) });

    map.addLayer({ id: 'area-fill', type: 'fill', source: 'area-disk',
      paint: { 'fill-color': '#4be3b0', 'fill-opacity': 0.08 } }, firstSymbol);
    map.addLayer({ id: 'area-outside-dim', type: 'fill', source: 'area-outside',
      paint: { 'fill-color': '#060b1a', 'fill-opacity': 0.68 } });
    map.addLayer({ id: 'area-glow-wide', type: 'line', source: 'area-line',
      layout: { 'line-cap': 'round', 'line-join': 'round' },
      paint: { 'line-color': '#5effc7', 'line-width': 26, 'line-blur': 28, 'line-opacity': 0.7 } });
    map.addLayer({ id: 'area-glow-mid', type: 'line', source: 'area-line',
      layout: { 'line-cap': 'round', 'line-join': 'round' },
      paint: { 'line-color': '#7bffe0', 'line-width': 9, 'line-blur': 6, 'line-opacity': 0.85 } });
    map.addLayer({ id: 'area-glow', type: 'line', source: 'area-line',
      layout: { 'line-cap': 'round', 'line-join': 'round' },
      paint: { 'line-color': '#ffffff', 'line-width': 2.6, 'line-blur': 0.5, 'line-opacity': 1 } });
    map.addLayer({ id: 'area-wall-core', type: 'fill-extrusion', source: 'area-wall-core',
      paint: { 'fill-extrusion-color': '#c3c8d1', 'fill-extrusion-height': 220,
        'fill-extrusion-base': 0, 'fill-extrusion-opacity': 0.7, 'fill-extrusion-vertical-gradient': true } });
    areaReady = true;
  }
  function areaMove(map, C, R) {
    if (!areaReady) return;
    map.getSource('area-disk').setData(disk(C, R));
    map.getSource('area-line').setData(lineF(C, R));
    map.getSource('area-wall-core').setData(annulus(C, R + 6, R - 6));
    map.getSource('area-outside').setData(outside(C, R));
  }

  // ---- coverflow deck ------------------------------------------------------
  const reel = document.getElementById('reel');
  const STEP = 112;
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  let cards = [];
  let pos = 0, target = 0;
  let dragging = false, moved = false, startX = 0, startPos = 0, lastX = 0, vel = 0;

  function renderReel(photos) {
    reel.innerHTML = '';
    cards = photos.map((p, i) => {
      const el = document.createElement('div');
      el.className = 'cf-card';
      const img = document.createElement('img');
      img.src = p.img; img.alt = ''; el.appendChild(img);
      el.addEventListener('click', () => { if (!moved) target = i; });
      reel.appendChild(el);
      return { el };
    });
    pos = Math.floor((photos.length - 1) / 2);
    target = pos;
    layout();
  }

  function layout() {
    const N = cards.length;
    cards.forEach((c, i) => {
      const d = i - pos;
      const ad = Math.abs(d);
      if (ad > 3.4) { c.el.style.display = 'none'; return; }
      c.el.style.display = '';
      const cl = clamp(d, -1, 1);
      const sign = Math.sign(d);
      const tilt = -cl * 56;
      const x = sign * (Math.min(ad, 1) * 116 + Math.max(ad - 1, 0) * 52);
      const scale = 1.344 - Math.min(ad, 1) * 0.684;
      const z = -Math.min(ad, 1) * 130 - Math.max(ad - 1, 0) * 46;
      const op = ad > 1 ? Math.max(0, 1 - (ad - 1) * 0.44) : 1;
      c.el.style.transform =
        'translate(' + x + 'px,0) translateZ(' + z + 'px) rotateY(' + tilt + 'deg) scale(' + scale + ')';
      c.el.style.zIndex = String(200 - Math.round(ad * 10));
      c.el.style.opacity = String(op);
    });
  }

  function tick() {
    if (!dragging) {
      pos += (target - pos) * 0.16;
      if (Math.abs(target - pos) < 0.001) pos = target;
    }
    layout();
    requestAnimationFrame(tick);
  }

  reel.addEventListener('pointerdown', (e) => {
    dragging = true; moved = false; startX = e.clientX; startPos = pos; lastX = e.clientX; vel = 0;
    reel.classList.add('grabbing');
    try { reel.setPointerCapture(e.pointerId); } catch (_) {}
  });
  window.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const dx = e.clientX - startX;
    if (Math.abs(dx) > 4) moved = true;
    pos = clamp(startPos - dx / STEP, 0, cards.length - 1);
    vel = e.clientX - lastX; lastX = e.clientX;
  });
  window.addEventListener('pointerup', () => {
    if (!dragging) return;
    dragging = false; reel.classList.remove('grabbing');
    target = clamp(Math.round(pos - vel * 0.03), 0, cards.length - 1);
  });
  reel.addEventListener('wheel', (e) => {
    e.preventDefault();
    const dz = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
    target = clamp(Math.round(target) + (dz > 0 ? 1 : -1), 0, cards.length - 1);
  }, { passive: false });

  requestAnimationFrame(tick);

  // ---- community list ------------------------------------------------------
  const csRows = document.getElementById('csRows');
  const sheet = document.getElementById('circleSheet');
  // identity tool refs
  const itCover = document.getElementById('itCover');
  const itName = document.getElementById('itName');
  const itDesc = document.getElementById('itDesc');

  // rebuild the list, EXCLUDING the active community (it now lives in the
  // WdIdentityTool / circle bar, so it drops out of the list).
  function renderList() {
    csRows.innerHTML = '';
    COMMUNITIES.forEach((c, i) => {
      if (i === activeIndex) return;
      const row = document.createElement('button');
      row.className = 'cs-row';
      row.dataset.i = i;
      row.innerHTML =
        '<span class="cs-thumb-wrap">' +
          '<img class="cs-thumb" src="' + c.thumb + '" alt="">' +
          (c.inside ? '<span class="cs-badge">エリア内</span>' : '') +
        '</span>' +
        '<span class="cs-mid"><span class="cs-nameline">' +
          '<span class="cs-name">' + c.name + '</span>' +
          '<span class="cs-dist">' + (c.dist / 1000).toFixed(1) + 'km</span>' +
        '</span><span class="cs-desc">' + c.desc + '</span></span>';
      row.addEventListener('click', () => focus(i));
      csRows.appendChild(row);
    });
  }

  // expandable bottom sheet: scroll grows it; picking a row or tapping
  // outside snaps it back to the compact ~3-row height.
  function expandSheet() { sheet.classList.add('expanded'); if (identityTool) identityTool.style.opacity = '0'; }
  function collapseSheet() { sheet.classList.remove('expanded'); csRows.scrollTop = 0; if (identityTool) identityTool.style.opacity = '1'; dockIdentity(); }
  csRows.addEventListener('scroll', () => { if (csRows.scrollTop > 4) expandSheet(); });
  document.addEventListener('pointerdown', (e) => { if (!sheet.contains(e.target)) collapseSheet(); }, true);

  // ---- deck pin (float over the active area) ------------------------------
  const identityTool = document.getElementById('identityTool');
  // dock the WdIdentityTool just above the collapsed circle sheet
  function dockIdentity() {
    if (!identityTool || !sheet) return;
    const wrap = sheet.offsetParent || sheet.parentElement;
    const h = sheet.classList.contains('expanded') ? sheet.dataset.collapsedH : sheet.offsetHeight;
    if (!sheet.classList.contains('expanded')) sheet.dataset.collapsedH = sheet.offsetHeight;
    const base = parseFloat(sheet.dataset.collapsedH || sheet.offsetHeight);
    identityTool.style.top = 'auto';
    identityTool.style.bottom = (base + 14) + 'px';
  }
  const LIFT = 150;
  function pin() {
    const EM = window.EarthMap;
    if (!EM || !EM.map) return;
    const p = EM.map.project(activeCenter);
    const cy = p.y - LIFT;
    reel.style.top = (cy - reel.offsetHeight / 2 - 64) + 'px';
  }

  // ---- fit the community area to ≈90% of screen width --------------------
  // The 60° pitch magnifies the near edge in perspective, so we can't derive
  // the zoom from a flat formula reliably. Instead we fly in with a rough
  // estimate, then measure the REAL projected span (ground truth) and nudge
  // the zoom until the widest extent of the circle ≈ 90% of the width.
  function estimateZoom(c) {
    // flat-mercator first guess (pitch corrected by refit afterwards)
    const mpp = (2 * c.radiusM) / (402 * 0.90);
    const worldMpp = 156543.03392 * Math.cos(c.center[1] * Math.PI / 180);
    return Math.log2(worldMpp / mpp) - 0.35; // bias out for pitch
  }
  function measureSpan(map, c) {
    let mn = 1e9, mx = -1e9;
    for (let i = 0; i < 48; i++) {
      const p = map.project(dest(c.center[0], c.center[1], c.radiusM, i / 48 * 2 * Math.PI));
      if (p.x < mn) mn = p.x;
      if (p.x > mx) mx = p.x;
    }
    return mx - mn;
  }
  // Snap the zoom so the area spans ≈90% of the width — synchronous: setZoom
  // updates the projection immediately, so we can iterate against the live
  // projection and land on-target within the same tap.
  function refitZoom(map, i) {
    if (i !== activeIndex) return;
    const c = COMMUNITIES[i];
    const W = map.getContainer().clientWidth, target = W * 0.90;
    for (let k = 0; k < 5; k++) {
      const span = measureSpan(map, c);
      if (Math.abs(span / target - 1) < 0.03) break;
      map.setZoom(map.getZoom() + Math.log2(target / span));
    }
    pin();
  }

  // ---- focus a community ---------------------------------------------------
  function focus(i, opts) {
    opts = opts || {};
    activeIndex = i;
    const c = COMMUNITIES[i];
    activeCenter = c.center;

    // active community moves into the WdIdentityTool; list rebuilds without it
    if (itCover) itCover.src = c.cover;
    if (itName) itName.textContent = c.name;
    if (itDesc) itDesc.textContent = c.desc;
    renderList();
    collapseSheet();
    renderReel(c.photos);

    const EM = window.EarthMap;
    if (!EM || !EM.map) return;
    areaMove(EM.map, c.center, c.radiusM);
    if (window.EarthOverlay && EarthOverlay.setCenter) EarthOverlay.setCenter(c.center);
    if (EM.setCenter) EM.setCenter(c.center);
    // zoom changes the instant you tap — jump straight to the fitted camera
    EM.map.stop();
    EM.map.jumpTo({ center: c.center, zoom: estimateZoom(c), pitch: 60, bearing: 0 });
    refitZoom(EM.map, i);
    pin();
  }

  // ---- boot ----------------------------------------------------------------
  function build() {
    const EM = window.EarthMap;
    if (!EM || !EM.map) { setTimeout(build, 120); return; }
    const map = EM.map;
    if (!map.isStyleLoaded()) { setTimeout(build, 150); return; }
    try {
      areaAdd(map, activeCenter, COMMUNITIES[0].radiusM);
      map.on('render', pin);
      map.on('resize', pin);
      focus(0);
    } catch (e) { console.warn('community focus:', e); }
  }
  build();
})();
</script>

</body>
</html>
